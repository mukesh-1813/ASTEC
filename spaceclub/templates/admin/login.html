{% extends "admin/login.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" type="text/css" href="{% static 'admin/css/custom_admin.css' %}">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
<style>
    body.login {
        background: #0f172a;
        /* Space dark bg */
        background-image: radial-gradient(circle at top right, rgba(74, 144, 226, 0.1), transparent 40%),
            radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.1), transparent 40%);
        color: #f8fafc;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .login #header {
        background: transparent;
        border-bottom: none;
        text-align: center;
        padding-bottom: 20px;
    }

    #content-main {
        width: 100%;
        max-width: 400px;
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        padding: 40px;
        box-sizing: border-box;
    }

    .login .form-row {
        border-bottom: none;
        padding: 15px 0;
    }

    .login .form-row label {
        display: block;
        margin-bottom: 8px;
        color: #94a3b8;
        font-weight: 500;
        font-size: 14px;
        padding-right: 0;
    }

    .login .form-row input[type="text"],
    .login .form-row input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 16px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: white;
        font-size: 16px;
        transition: all 0.3s ease;
    }

    .login .form-row input:focus {
        border-color: #4a90e2;
        box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        outline: none;
    }

    .login .submit-row {
        background: transparent;
        border-top: none;
        padding: 20px 0 0 0;
        text-align: center;
    }

    .login .submit-row input[type="submit"] {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #4a90e2 0%, #3b82f6 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .login .submit-row input[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.6);
    }

    #site-name a {
        color: #f8fafc;
        font-size: 24px;
        font-weight: 700;
        text-decoration: none;
    }
</style>
{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}">
        <i class="fas fa-rocket" style="color: #4a90e2; margin-right: 10px;"></i>
        Space Club Dashboard
    </a>
</div>
{% endblock %}
